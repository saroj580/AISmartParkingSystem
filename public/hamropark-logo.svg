<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-text-hamro { font-family: 'Arial', sans-serif; font-size: 120px; font-weight: bold; fill: #0F3460; }
      .logo-text-park { font-family: 'Arial', sans-serif; font-size: 120px; font-weight: bold; fill: #2ecc71; }
      .logo-tagline { font-family: 'Arial', sans-serif; font-size: 30px; fill: #0F3460; }
    </style>
  </defs>

  <!-- Main Logo Mark Group -->
  <g id="logo-mark" transform="translate(80, 40)">
    <!-- Pagoda -->
    <g id="pagoda">
      <!-- Top spire -->
      <polygon points="320,20 340,80 300,80" fill="#0F3460"/>
      <!-- Second level -->
      <rect x="270" y="85" width="100" height="50" fill="#0F3460"/>
      <polygon points="270,85 220,120 320,120 370,85" fill="#0F3460"/>
      <!-- Third level -->
      <rect x="240" y="140" width="160" height="60" fill="#0F3460"/>
      <polygon points="240,140 180,180 380,180 420,140" fill="#0F3460"/>
      <!-- Base -->
      <rect x="210" y="210" width="220" height="120" fill="#0F3460"/>
      <polygon points="210,210 150,260 450,260 510,210" fill="#0F3460"/>
    </g>

    <!-- Mountain -->
    <g id="mountain">
      <polygon points="420,120 520,280 320,280" fill="white" opacity="0.85"/>
      <polygon points="460,120 540,260 380,260" fill="white"/>
    </g>

    <!-- Car Icon -->
    <g id="car" transform="translate(360, 260)">
      <rect x="10" y="20" width="80" height="40" rx="8" fill="none" stroke="#0F3460" stroke-width="3"/>
      <line x1="25" y1="60" x2="25" y2="75" stroke="#0F3460" stroke-width="3"/>
      <line x1="75" y1="60" x2="75" y2="75" stroke="#0F3460" stroke-width="3"/>
      <circle cx="25" cy="80" r="8" fill="none" stroke="#0F3460" stroke-width="2"/>
      <circle cx="75" cy="80" r="8" fill="none" stroke="#0F3460" stroke-width="2"/>
    </g>

    <!-- Location Pin -->
    <g id="pin" transform="translate(140, 300)">
      <path d="M 0 0 C -20 -25 -30 -40 -30 -60 C -30 -90 -10 -110 20 -110 C 50 -110 70 -90 70 -60 C 70 -40 60 -25 40 0 C 20 30 0 60 0 60 C 0 60 -20 30 0 0 Z" fill="none" stroke="#2ecc71" stroke-width="5"/>
      <circle cx="20" cy="-60" r="15" fill="#2ecc71"/>
    </g>

    <!-- Letter P (stylized large) -->
    <g id="letter-p">
      <path d="M 550 50 L 550 300 M 550 50 L 650 50 Q 700 50 700 120 Q 700 180 650 180 L 550 180" fill="none" stroke="#0F3460" stroke-width="25" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Text Below Logo -->
  <text x="70" y="420" class="logo-text-hamro">Hamro</text>
  <text x="480" y="420" class="logo-text-park">Park</text>

  <!-- Decorative Lines and Tagline -->
  <line x1="150" y1="460" x2="320" y2="460" stroke="#0F3460" stroke-width="2"/>
  <text x="340" y="475" class="logo-tagline">Parking made easy, for us.</text>
  <line x1="760" y1="460" x2="920" y2="460" stroke="#0F3460" stroke-width="2"/>
</svg>
